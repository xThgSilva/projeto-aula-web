<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="../css/global.css" />
    <link rel="stylesheet" href="../css/pop.css" />
  </head>
  <body>
    <main class="card-carro">
      <!-- <img id="imgCarro" src="" alt="Imagem do produto" /> -->
      <div class="slider">
        <button id="prevBtn">&#10094;</button>
        <img src="" alt="" id="slider-img" />
        <button id="nextBtn">&#10095;</button>
      </div>
      <div class="info-carro">
        <h1 id="nomeCarro"></h1>
        <p id="descCarro"></p>
        <p>Preço: <span id="precoCarro">R$ </span></p>
        <br />
      </div>
    </main>
    <button id="btnVoltar" onclick="fecharDetalhes()">Voltar</button>
  </body>
  <script>
    // Pra voltar
    const btnVoltar = document
      .getElementById("btnVoltar")
      .addEventListener("click", () => {
        window.history.back();
      });

    // Pegandos os dados da URL
    function getProperties(carroDetails) {
      const urlParametro = new URLSearchParams(window.location.search);
      return urlParametro.get(carroDetails);
    }

    // Preencendo campos
    // document.getElementById("imgCarro").src = `${getProperties("imgCarro")}`;
    document.getElementById("nomeCarro").innerText =
      `${getProperties("nomeCarro")}`;
    document.title = `${getProperties("nomeCarro")}`;
    document.getElementById("precoCarro").innerText +=
      `${getProperties("precoCarro")}`;
    document.getElementById("descCarro").innerHTML =
      `${getProperties("descricao")}`;

    //Slider
    const imagens = getProperties("imgCarro")
      ? getProperties("imgCarro").split(",")
      : [];

    let i = 0;
    const imgSlider = document.getElementById("slider-img");

    function showImages() {
      if (imagens.length > 0) {
        imgSlider.src = imagens[i];
      }
    }
    showImages();

    const prevBtn = document.getElementById("prevBtn");
    const nextBtn = document.getElementById("nextBtn");

    prevBtn.addEventListener("click", () => {
      if (i > 0) {
        i--;
        showImages();
      }
    });

    nextBtn.addEventListener("click", () => {
      if (i < imagens.length - 1) {
        i++;
        showImages();
      }
    });

    showImages();
  </script>
</html>
