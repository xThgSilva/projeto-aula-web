<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Produtos</title>
    <link rel="stylesheet" href="../css/produtos.css" />
  </head>
  <body>
    <header>
      <a href="../../index.html"
        ><img
          src="../img/logo.png"
          alt="Logo da ferrari"
          class="logo"
          title="Voltar a Home"
      /></a>
      <!-- <img class="carro-animation" src="src/img/carro-animation.png" /> -->
      <nav>
        <ul>
          <li><a href="../../index.html">Home</a></li>
          <li id="data-hora"></li>
        </ul>
      </nav>
    </header>
    <main class="main-produtos">
      <h1>Carros</h1>
      <p>Carros da Ferrari abaixo:</p>
      <section class="section-produtos">
        <div
          onclick="
            mostrarDetalhes(
              'Ferrari F12 Berlinetta',
              '../img/produtos/img_produto.jpg',
              '10,000,000',
            )
          "
        >
          <img src="../img/produtos/img_produto.jpg" alt="Imagem do produto" />
          <h3>Ferrari F12 Berlinetta</h3>
          <i>Preço: <span>R$10,000,000</span></i>
        </div>
        <div
          onclick="
            mostrarDetalhes(
              'Ferrari F12 Berlinetta',
              '../img/produtos/img_produto.jpg',
              '10,000,000',
            )
          "
        >
          <img src="../img/produtos/img_produto.jpg" alt="Imagem do produto" />
          <h3>Ferrari F12 Berlinetta</h3>
          <i>Preço: <span>R$10,000,000</span></i>
        </div>
        <div
          onclick="
            mostrarDetalhes(
              'Ferrari F12 Berlinetta',
              '../img/produtos/img_produto.jpg',
              '10,000,000',
            )
          "
        >
          <img src="../img/produtos/img_produto.jpg" alt="Imagem do produto" />
          <h3>Ferrari F12 Berlinetta</h3>
          <i>Preço: <span>R$10,000,000</span></i>
        </div>
      </section>
    </main>
    <footer id="contato">
      <div class="info-contato">
        <img
          src="../img/ferrari-logo-footer.png"
          alt="Cavalo da Ferrari prateado"
        />
        <div>
          <p>
            <i class="fa-solid fa-phone"></i>
            (11) 3087 - 0199 |
            <a target="_blank" href="https://www.instagram.com/ferrari/">
              <i class="fa-brands fa-instagram"></i>
              Instagram
            </a>
          </p>
        </div>
      </div>
    </footer>
  </body>
  <script>
    // alert("Conheça nossos produtos");
    const data = new Date();
    const infoData = document.getElementById("data-hora");
    infoData.textContent += `${data.getDate()}/${data.getMonth() + 1}/${data.getFullYear()} - ${data.getHours()}:${data.getMinutes()}`;

    function mostrarDetalhes(nomeProduto, imgUrl, preco) {
      const url = `pop_produtos.html?nomeCarro=${encodeURIComponent(nomeProduto)}
        &imgCarro=${encodeURIComponent(imgUrl)}
        &precoCarro=${encodeURIComponent(preco)}`;

      window.open(url, "_blank", "width=800, height=700");
    }
  </script>
</html>
